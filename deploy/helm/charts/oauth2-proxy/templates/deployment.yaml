{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: {{ .Values.image | quote }}
          args: ["--config", "/etc/oauth2-proxy.cfg"]
          ports:
            - containerPort: 4180
          volumeMounts:
            - name: cfg
              mountPath: /etc/oauth2-proxy.cfg
              subPath: oauth2-proxy.cfg
      volumes:
        - name: cfg
          configMap:
            name: {{ .Release.Name }}-oauth2-config
{{- end }}
