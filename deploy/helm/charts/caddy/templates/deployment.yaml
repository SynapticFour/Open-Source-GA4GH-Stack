{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-caddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: cfg
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
      volumes:
        - name: cfg
          configMap:
            name: {{ .Release.Name }}-caddyfile
{{- end }}
