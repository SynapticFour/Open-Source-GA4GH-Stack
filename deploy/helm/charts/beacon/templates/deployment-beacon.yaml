{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beacon.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "beacon.name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "beacon.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "beacon.name" . }}
    spec:
      containers:
        - name: beacon
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: 5050
          volumeMounts:
            - name: conf
              mountPath: /beacon/conf/conf.py
              subPath: conf.py
          readinessProbe:
            httpGet:
              path: /ga4gh/beacon/v2/service-info
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: conf
          configMap:
            name: {{ include "beacon.fullname" . }}-conf
{{- end }}
