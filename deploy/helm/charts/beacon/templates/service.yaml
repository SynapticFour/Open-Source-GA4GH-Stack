{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beacon.fullname" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "beacon.name" . }}
  ports:
    - port: 5050
      targetPort: 5050
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beacon.fullname" . }}-mongo
spec:
  selector:
    app.kubernetes.io/name: beacon-mongo
  ports:
    - port: 27017
      targetPort: 27017
{{- end }}
