name: Dependabot Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: dependabot-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Python smoke
        run: |
          set -e
          python -m pip install --upgrade pip
          found=0
          for f in $(git ls-files "**/requirements.txt"); do
            found=1
            python -m pip install -r "$f"
          done
          if [ "$found" -eq 0 ]; then echo "No requirements.txt found; skipping install."; fi
          python -m pip check || true
