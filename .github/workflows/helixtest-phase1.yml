name: HelixTest Phase 1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  beacon-safe-subset:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CLI
        run: pip install -e "./cli"

      - name: Generate compose (Beacon profile)
        run: |
          lab-stack generate compose \
            --config config/profiles/beacon-only.env \
            --output /tmp/ga4gh-cs

      - name: Start Beacon + MongoDB
        run: |
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml \
            --project-directory /tmp/ga4gh-cs up -d beacon mongodb

      - name: Wait for Beacon service-info
        id: wait
        run: |
          ready=false
          attempts=120
          check_every=12
          for i in $(seq 1 $attempts); do
            if curl -fsS http://localhost:5050/ga4gh/beacon/v2/service-info >/dev/null; then
              ready=true
              break
            fi
            echo "[wait] Beacon not ready yet (attempt ${i}/${attempts}), sleeping 5s"
            if [ $((i % check_every)) -eq 0 ]; then
              echo "---- Beacon container state (checkpoint ${i}/${attempts}) ----"
              docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs ps -a || true
              echo "---- Beacon last logs (checkpoint ${i}/${attempts}) ----"
              docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs logs --no-color --tail=50 beacon || true
            fi
            sleep 5
          done

          if [ "$ready" = "true" ]; then
            echo "beacon_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "beacon_ready=false" >> "$GITHUB_OUTPUT"
          echo "Beacon did not become ready within $((attempts*5))s"
          echo "---- Beacon container state ----"
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs ps -a || true
          echo "---- Beacon + Mongo logs (tail) ----"
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs logs --no-color --tail=200 beacon mongodb || true
          exit 0

      - name: Seed Beacon demo data into MongoDB
        if: steps.wait.outputs.beacon_ready == 'true'
        run: |
          # Seed the minimal demo collections that HelixTest queries.
          # This mirrors `lab-stack demo seed` / `run_demo_seed` behavior.
          MONGO_PASSWORD="$(awk -F= '$1=="MONGO_PASSWORD"{print $2; exit}' /tmp/ga4gh-cs/.env)"

          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs exec -T mongodb mongoimport \
            --authenticationDatabase admin -u root -p "$MONGO_PASSWORD" \
            --db beacon --collection datasets --jsonArray --file /demo/datasets.json

          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs exec -T mongodb mongoimport \
            --authenticationDatabase admin -u root -p "$MONGO_PASSWORD" \
            --db beacon --collection cohorts --jsonArray --file /demo/cohorts.json

          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs exec -T mongodb mongoimport \
            --authenticationDatabase admin -u root -p "$MONGO_PASSWORD" \
            --db beacon --collection individuals --jsonArray --file /demo/individuals.json

          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs exec -T mongodb mongoimport \
            --authenticationDatabase admin -u root -p "$MONGO_PASSWORD" \
            --db beacon --collection genomicVariations --jsonArray --file /demo/genomicVariations.json

      - name: Beacon diagnostics on failure
        if: failure()
        run: |
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs ps
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml --project-directory /tmp/ga4gh-cs logs --no-color beacon mongodb || true

      - name: Checkout HelixTest
        uses: actions/checkout@v6
        with:
          repository: SynapticFour/HelixTest
          path: helixtest-upstream

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run HelixTest (phase 1, beacon-only, non-blocking)
        if: steps.wait.outputs.beacon_ready == 'true'
        env:
          BEACON_URL: http://localhost:5050/ga4gh/beacon/v2
        run: |
          cd helixtest-upstream/helixtest
          outfile=/tmp/helix-report-phase1.json
          rm -f "$outfile"

          # stdout goes to the JSON report file; stdout/stderr may otherwise be quiet.
          cargo run --bin helixtest -- \
            --all \
            --mode ferrum \
            --only beacon \
            --verbose \
            --report json \
            --fail-level 0 > "$outfile" &

          pid=$!
          # While HelixTest runs, periodically tail the stdout report file
          # so GitHub UI shows progress rather than looking "stuck".
          while kill -0 "$pid" 2>/dev/null; do
            echo "---- HelixTest stdout tail ----"
            if [ -s "$outfile" ]; then
              tail -n 30 "$outfile" || true
            else
              echo "(no stdout yet)"
            fi
            sleep 20
          done
          ec=0
          wait "$pid" || ec=$?
          if [ "$ec" -eq 101 ]; then
            echo "::error::Cargo failed to build or run HelixTest (exit 101)"
            exit 101
          fi
          if [ "$ec" -ne 0 ]; then
            echo "::warning::HelixTest exited with $ec; see artifact helix-report-phase1"
          fi
          exit 0

      - name: Upload HelixTest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: helix-report-phase1
          path: /tmp/helix-report-phase1.json
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: |
          docker compose -f /tmp/ga4gh-cs/docker-compose.generated.yml \
            --project-directory /tmp/ga4gh-cs down -v
