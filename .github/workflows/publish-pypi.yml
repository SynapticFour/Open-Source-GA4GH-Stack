# Trusted publishing: configure the "ga4gh-community-stack" project on PyPI
# (Publishing → Manage → Add a trusted publisher → GitHub workflow).
# Until then, run `hatch build` locally and upload with `twine`.

name: Publish PyPI

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.repository_owner == 'SynapticFour'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hatch
        run: pip install hatch

      - name: Build
        working-directory: cli
        run: hatch build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
