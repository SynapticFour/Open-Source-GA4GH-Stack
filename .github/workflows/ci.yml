name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e "./cli[dev]"

      - name: pytest
        run: pytest cli/tests/

      - name: ruff
        run: ruff check cli/src/

      - name: mypy
        run: mypy cli/src/ --strict
